replicaCount: 2

loadBalancer:
  enabled: false

service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  annotations:
    metallb.io/address-pool: public-v6-pool
  ipDualStack:
    enabled: true
    ipFamilies:
      - IPv6
    ipFamilyPolicy: SingleStack

ingressController:
  className: caddy-public
  classNameRequired: true
  leaseId: caddy-public
  config:
    metrics: true
    debug: false
    # Set a real email before installing so Caddy can manage ACME certificates.
    email: admin@example.com
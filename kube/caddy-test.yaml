apiVersion: v1
kind: Namespace
metadata:
  name: caddy-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: caddy-test
data:
  Caddyfile: |
    :80 {
      respond "Caddy test over HTTP from Kubernetes" 200
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: caddy-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: caddy:2.8-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: caddyfile
          configMap:
            name: caddy-config
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: caddy-test
spec:
  selector:
    app: caddy
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caddy
  namespace: caddy-test
spec:
  ingressClassName: caddy-private
  tls:
    - hosts:
        - caddy.vms.lan
      secretName: caddy-test-tls
  rules:
    - host: caddy.vms.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: caddy
                port:
                  number: 80

apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: private-v6-pool
  namespace: metallb-system
spec:
  addresses:
    - fd38:82fc:4248:44:1::100-fd38:82fc:4248:44:1::150
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: private-v6
  namespace: metallb-system
spec:
  ipAddressPools:
    - private-v6-pool
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: public-v6-pool
  namespace: metallb-system
spec:
  # Only apply this pool if 2001:470:e309:44::/64 is actually on-link for the
  # same L2 segment as your Kubernetes nodes. If that prefix is only routed to
  # OPNsense and not present on the LAN, keep using private-v6-pool for now and
  # move the public pool to BGP later.
  addresses:
    - 2001:470:e309:44:1::100-2001:470:e309:44:1::150
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: public-v6
  namespace: metallb-system
spec:
  ipAddressPools:
    - public-v6-pool
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: private-and-public-v6
  namespace: metallb-system
spec:
  ipAddressPools:
    - private-v6-pool
    - public-v6-pool
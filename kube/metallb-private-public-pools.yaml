apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: private-v6-pool
  namespace: metallb-system
spec:
  addresses:
    - fd38:82fc:4248:44:1::100-fd38:82fc:4248:44:1::150
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: private-v6
  namespace: metallb-system
spec:
  ipAddressPools:
    - private-v6-pool
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: public-v6-pool
  namespace: metallb-system
spec:
  addresses:
    - 2001:470:e309:88:1::100-2001:470:e309:88:1::150
    - 172.16.88.100-172.16.88.150
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: public-v6
  namespace: metallb-system
spec:
  ipAddressPools:
    - public-v6-pool
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: private-and-public-v6
  namespace: metallb-system
spec:
  ipAddressPools:
    - private-v6-pool
    - public-v6-pool
replicaCount: 2

nameOverride: caddy-private

loadBalancer:
  enabled: false

service:
  type: LoadBalancer
  externalTrafficPolicy: Local
  internalTrafficPolicy: Cluster
  annotations:
    metallb.io/address-pool: private-v6-pool
  ipDualStack:
    enabled: true
    ipFamilies:
      - IPv6
    ipFamilyPolicy: SingleStack

ingressController:
  className: caddy-private
  classNameRequired: true
  leaseId: caddy-private
  config:
    metrics: true
    debug: false
    # Private/internal hostnames usually use Caddy's internal CA. Clients must
    # trust that CA to avoid TLS warnings.
    email: ""
    acmeCA: https://caddy-ca.internal/v1/acme-ca/directory